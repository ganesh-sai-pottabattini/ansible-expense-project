- name: Configuring backend for expense
  hosts: backend
  become: true
  tasks:
  - name: Change hostname to backend
    hostname:
      name: backend

  - name: Disabling NodeJs previous Version
    dnf:
      name: nodejs
      state: removed

  - name: Enabling NodeJs 20
    command: dnf module enable nodejs:20 -y

  - name: Installing NodeJs
    dnf:
      name: nodejs
      state: present

  - name: Verify NodeJs Version
    command: node -v
    register: nodejs_output

  - name: Print the NodeJs Version
    debug:
      msg: "{{ nodejs_output.stdout }}"

  - name: Delete the directory of it exists 
    file:
      path: /app
      state: absent

  - name: Delete the .zip file if it exists
    file: 
      path: /tmp/backend.gz
      state: absent
  
  - name: create a new /app directory
    file:
      path: /app
      state: directory
  
  - name: Add application User - system
    user:
      name: expense
      home: /app
      system: true
      shell: /sbin/nologin
      comment: expense system user for backend

  - name: Download the backend application
    get_url:
      url: https://raw.githubusercontent.com/daws-90s/expense-documentation/refs/heads/main/artifacts/expense-backend-v3.tar.gz
      dest: /tmp/backend.tar.gz
    
  - name: Extract the backend application
    unarchive:
      src: /tmp/backend.tar.gz
      dest: /app
      remote_src: yes

  - name: Install the dependencies 
    community.general.npm:
      path: /app
  
  - name: Configure the systemd service for backend
    template:
      src: backend.service.j2
      dest: /etc/systemd/system/backend.service
  - name : Install the mysql client
    dnf:
      name: mysql
      state: present

  - name: Install the mysql client
    pip:
      name: PyMySQL
      executable: pip3.9

  - name: Load the schema for backend
    community.mysql.mysql_db:
      state: import
      name: all
      login_user: root
      login_password: ExpenseApp@1
      login_host: "{{ DATABASE_HOST }}"
      target: /app/schema/backend.sql
    
  - name: Reload the systemd
    systemd_service:
      name: backend
      daemon_reload: yes

  - name: Start and enable the backend service
    systemd:
      name: backend
      state: started
      enabled: yes